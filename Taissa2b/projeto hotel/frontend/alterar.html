<!DOCTYPE html>
<html lang="pt-br">

<!-- =============================================================================
🏨 HOTEL CARIBE AZUL - PÁGINA DE ALTERAÇÃO DE DADOS
💡 Objetivo: permitir editar informações de um cliente já cadastrado.
📘 O sistema busca os dados via ID, preenche o formulário automaticamente
    e envia as alterações ao backend Flask, que atualiza o Excel (.xlsx).
🎓 Didático: feito para alunos compreenderem a integração HTML + JS + Flask.
============================================================================= -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterar Dados do Cliente14/04</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

    <header>
        <div id="carouselExampleIndicators" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">               
               <!--primeira imagem(ativa por padrâo)-->
                <div class="carousel-item active">
                    <img src="assets/images/banner1.png" class="d-block w-100" alt="banner1">
                </div>           
                <div class="carousel-item">
                    <img src="https://dynamic-media-cdn.tripadvisor.com/media/photo-o/11/78/7a/05/foto-aerea-da-nova-area.jpg?w=900&h=500&s=1" class="d-block w-100" alt="banner2">
                </div>            
                <div class="carousel-item">
                    <img src="assets/images/banner3.png" class="d-block w-100" alt="banner3">
                </div>
            </div>
        </div> 
    </header>

    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-white" href="/">🏙️Hotel luar</a>

            <!-- 📱 Botão do menu para telas pequenas -->
            <button class="navbar-toggler"  type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class=navbar-toggler-icon></span>
            </button>
            <!-- 🧭 Itens do menu -->
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul>
                    <li>
                        <a href="/">⚜️Cadastro</a>
                    </li>
                    <li>
                        <a href="/consulta">🔍Consultar</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- =============================================================================
    🧾 FORMULÁRIO DE ALTERAÇÃO
    -----------------------------------------------------------------------------
    💡 O formulário será automaticamente preenchido pelo JS (main.js),
       que obtém os dados do cliente pelo ID na URL:
       ➜ /alterar?id=3
    ⚙️ Ao clicar em “Salvar Alterações”, o JS envia os novos dados
       via POST para a rota Flask:
       ➜ /api/atualizar/<id>
    ============================================================================= -->
    <div>
        <h2> ⚜️Alterar Dados do Cliente⚜️</h2>

        <!-- Formulário principal -->
        <form id="formAlterar">
            <!-- Campo oculto: ID do cliente -->
            <input type="hidden" id="clienteId">

            <div>
                <!-- Campo Nome -->
                <div>
                    <label>Nome:</label>
                    <input type="text" id="nome" required>
                </div>

                <!-- Campo CPF -->
                <div>
                    <label>CPF:</label>
                    <input type="text" id="cpf" required>
                </div>

                <!-- Campo Email -->
                <div>
                    <label>Email:</label>
                    <input type="email" id="email" required>
                </div>

                <!-- Campo Telefone -->
                <div>
                    <label>Telefone:</label>
                    <input type="text" id="telefone" required>
                </div>

                <!-- Campo Endereço -->
                <div>
                    <label>Endereço:</label>
                    <input type="text" id="endereco" required>
                </div>

                <!-- Campo Observações -->
                <div>
                    <label>Observações:</label>
                    <textarea id="observacoes"></textarea>
                </div>
            </div>

            <!-- Botão de Salvar -->
            <div>
                <button type="submit">💾 Salvar Alterações</button>
            </div>
        </form>

        <!-- Mensagem de confirmação (sucesso ou erro) -->
        <div id="mensagem"></div>
    </div>

    <!-- =============================================================================
    ⚙️ SCRIPTS JAVASCRIPT
    -----------------------------------------------------------------------------
    💡 O main.js controla:
       - O preenchimento automático dos campos ao abrir a página
       - O envio das alterações ao servidor Flask
       - As mensagens de sucesso/erro
    ============================================================================= -->
    <script src="assets/js/main.js"></script>
    <footer class="text-center mt-5 p-3 text-white bg-dark">
        <p>📕sistema de alteração | 📙Desenvolvido para fins didáticos</p>
    </footer>

</body>

</html>
