<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8"> <!-- 💡 Define o padrão de caracteres (permite acentos) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
   
    <header>
        <div id="carouselExampleIndicators" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">               
               <!--primeira imagem(ativa por padrâo)-->
                <div class="carousel-item active">
                    <img src="https://img.freepik.com/vetores-gratis/fundo-de-sinal-de-neon-de-hotel-realista_23-2148160065.jpg">
                </div>           
                <div class="carousel-item">
                    <img src="https://www.riellishotel.com.br/img/quartos/quarto-luxo-duplo02.jpg">
                </div>            
                <div class="carousel-item">
                    <img src="https://www.maladeaventuras.com/wp-content/uploads/2019/04/pousada-com-piscina-praia-do-rosa.jpg" class="d-block w-100" alt="banner3">
                </div>
            </div>
        </div> 
    </header>

    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-white" href="/">🏙️Hotel luar</a>
            <!-- 📱 Botão que aparece em telas pequenas (menu colapsável) -->
            <button class="navbar-toggler"  type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class=navbar-toggler-icon></span>
            </button>
            <!-- 🧭 Itens de navegação -->
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li>
                        <a href="/">⚜️Cadastro</a>
                    </li>
                    <li>
                        <!-- Link para a página de consulta -->
                        <a href="/consulta">🔍Consultar</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <form id="formCadastro">
        <div>
            <div>
                <label> Nome:</label>
                <input type="text" name="nome" required>
            </div>
        </div>
        <div>
            <div>
                <label> CPF:</label>
                <input type="text" name="cpf" required>
            </div>
        </div>

        <div>
            <div>
                <label> Email:</label>
                <input type="email" name="email" required>
            </div>
        </div>
        <div>
            <div>
                <label> Telefone:</label>
                <input type="text" name="telefone" required>
            </div>
        </div>

        <div>
            <div>
                <label> Endereço:</label>
                <input type="text" name="endereco" required>
            </div>
        </div>

        <div>
            <div>
                <label> Observação:</label>
                <textarea type="text" name="observacao" required> </textarea>
            </div>
        </div>
        <button type="submit" class="btn-primary ">Cadastrar</button>
    </form>

    <div id="mensagem"></div>

    <!-- =============================================================================
    ⚙️ SCRIPTS JAVASCRIPT
    -----------------------------------------------------------------------------
        💡 O segundo importa o main.js (responsável pela comunicação com Flask e o efeito de neve).
    ============================================================================= -->
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <footer class="text-center mt-5 p-3 text-white bg-dark">
        <p>sistema de Cadastro | Desenvolvido para fins didáticos</p>
    </footer>
</body>

</html>
