<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8"> <!-- 💡 Define o padrão de caracteres (permite acentos) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes</title>


    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>

    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient">
      <div class="container-fluid">
         <!-- logotipo/ noe do hotel-->
        <a class="navbar-brand fw-bold text-white" href="/"> 🏨Hotel luar</a>
         <!--boato que aparece em telas pequenas (menu colapsavel)-->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" >
                <span class="navbar-toggler-icon"></span>
            </button>
            <!---item de navegacao-->

            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a  class="nav-link active text-white" href="/">✨Cadastro</a>
                    </li>
                    <li>
                        <a  class="nav-link text-white" href="/consulta">🔍Consultar</a>
                    </li>
                </ul>
            </div>
      </div>
   </nav>
          <!--BANNER  VAI MOSTRAR 3 IMAGENS-->
        <header>
            <div id="CarouselExempleIndicators" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="https://img.freepik.com/vetores-gratis/fundo-de-sinal-de-neon-de-hotel-realista_23-2148175419.jpg" class="d-block w-100" alt="Banner 1">
                        </div>
                        <div class="carousel-item">
                        <img src="https://plus.unsplash.com/premium_photo-1661964071015-d97428970584?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8aG90ZWx8ZW58MHx8MHx8fDA%3D" class="d-block w-100" alt="Banner 2">
                        </div>
                        <div class="carousel-item">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRPjobchSUfPnp0ObuGgAmuWfBkZcelos7JsQ&s" class="d-block w-100" alt="Banner 3">
                    </div>
                </div> 
            </div>
       </header>
       </nav>
     <main class="container mt-4">
        <h2 class="text-center mb-4">✨Cadastro De Clientes✨</h2>
            <form id="formCadastro" class="p-3 rounded bg-light shadow">
                <div>
                    <div>
                        <label> Nome:</label>
                        <input type="text"  class="form-control" name="nome" required>
                    </div>
                </div>
                <div>
                    <div>
                        <label> CPF:</label>
                        <input type="text" class="form-control" name="cpf" required>
                    </div>
                </div>

                <div>
                    <div>
                        <label> Email:</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                </div>
                <div>
                    <div>
                        <label> Telefone:</label>
                        <input type="text" class="form-control" name="telefone" required>
                    </div>
                </div>

                <div>
                    <div>
                        <label> Endereço:</label>
                        <input type="text" class="form-control" name="endereco" required>
                    </div>
                </div>

                <div>
                    <div>
                        <label> Observação:</label>
                        <textarea type="text" class="form-control" name="observacao" required> </textarea>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary">Cadastrar</button>
            
            </form>
     </main>
    <div id="mensagem"></div>

    <!-- =============================================================================
    ⚙️ SCRIPTS JAVASCRIPT
    -----------------------------------------------------------------------------
           o primeiro importa o bootstrap.
           o segundo importa o main.js (responsável pela comunicação com Flask e o efeito de neve).
    ============================================================================= -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


    <script src="assets/js/main.js"></script>

    <footer class="text-center mt-5 p-3 text-white bg-dark">
        <p> Sistema de Cadastro | Desenvolvido para fins didáticos.</p>
    </footer>

</body>

</html>
