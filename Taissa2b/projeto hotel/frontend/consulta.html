<!DOCTYPE html>
<html lang="pt-br">
<!-- =============================================================================
🏨 HOTEL CARIBE AZUL - PÁGINA DE CONSULTA DE CLIENTES
💡 Objetivo: permitir que o usuário procure clientes cadastrados no sistema.
📘 O backend Flask retorna os dados do Excel (.xlsx) e o JS exibe tudo em tabela.
🎓 Feito para demonstrar integração front-end (HTML + JS) com back-end (Python Flask)
============================================================================= -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖Consulta de Clientes</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <header>
        <div id="carouselExampleIndicators" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">               
               <!--primeira imagem(ativa por padrâo)-->
                <div class="carousel-item active">
                    <img src="assets/images/banner1.png" class="d-block w-100" alt="banner1">
                </div>           
                <div class="carousel-item">
                    <img src="https://dynamic-media-cdn.tripadvisor.com/media/photo-o/11/78/7a/05/foto-aerea-da-nova-area.jpg?w=900&h=500&s=1" class="d-block w-100" alt="banner2">
                </div>            
                <div class="carousel-item">
                    <img src="assets/images/banner3.png" class="d-block w-100" alt="banner3">
                </div>
            </div>
        </div> 
    </header>

    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-white" href="/">🏙️Hotel luar</a>

            <!-- 📱 Botão do menu em telas pequenas -->
            <button class="navbar-toggler"  type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class=navbar-toggler-icon></span>
            </button>
            <!-- 🧭 Itens do menu -->
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul>
                    <li>
                        <a href="/">⚜️Cadastro</a>
                    </li>
                    <li>
                        <!-- Página atual -->
                        <a href="/consulta">🔍Consultar</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- =============================================================================
    📋 ÁREA PRINCIPAL - CONSULTA DE CLIENTES
    -----------------------------------------------------------------------------
    💡 Aqui o aluno poderá digitar um nome e buscar os clientes cadastrados.
    ⚙️ O JavaScript (main.js) envia uma requisição GET para:
        ➜ /api/buscar?nome=Fulano
    O backend Flask responde com os dados filtrados do arquivo Excel.
    ============================================================================= -->
    <div>
        <h2>🔍 Consulta de Clientes</h2>

        <!-- 🧠 Campo de busca com botão -->
        <div>
            <input type="text" id="campoBusca" placeholder="Digite o nome do cliente">
            <button id="btnBuscar" >Buscar</button>
        </div>

        <!-- 🧾 Tabela de resultados -->
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>Email</th>
                    <th>Telefone</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <!-- 💡 O corpo da tabela será preenchido dinamicamente via JS -->
            <tbody id="tabelaResultados"></tbody>
        </table>
    </div>

    <!-- =============================================================================
    ⚙️ SCRIPTS JAVASCRIPT
    -----------------------------------------------------------------------------
    💡 main.js → responsável por:
       - Fazer a busca dos clientes no servidor Flask (/api/buscar)
       - Preencher automaticamente a tabela
       - Adicionar botão "Editar" em cada linha
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    ============================================================================= -->
    <script src="assets/js/main.js"></script>
    <footer class="text-center mt-5 p-3 text-white bg-dark">
        <p>sistema de consulta | Desenvolvido para fins didáticos</p>
    </footer>
</body>

</html>
